name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Type check
        run: npm run tsc

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build
        run: npm run build

  storybook:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build Storybook
        run: npm run build-storybook

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./node_modules/playwright/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # ブラウザバイナリ DL（キャッシュミス時のみ）と system deps（毎回 apt）を分離する。
      # --with-deps で両者を束ねると DL/apt のどちらが詰まっても切り分け不能になり、
      # かつ DL 経路がハングするとキャッシュ保存まで到達せず cold miss が永続化するため。
      #
      # storybook test-runner は CI で headless 実行（channel 指定なし）のためフル chromium 本体は
      # 不要で headless shell だけで動く。`--only-shell` でフル本体 DL を省き shell のみ取得する。
      #
      # ハングの実態（ログで確定）: zip は毎回 1 秒で 100% まで完走するのに、その後 ~150 秒
      # 無出力で固まる。展開なら 112MB は数秒で終わるため展開でもなく、全バイト受信後に
      # コネクションが閉じず（FIN が来ず）ストリーム終了待ちで stall している典型パターン。
      # GitHub runner ↔ cdn.playwright.dev の IPv6 経路が half-working（転送は通るが teardown が
      # 固まる）なときに出る。Node の DNS を IPv4 優先にして IPv6 teardown stall を回避する。
      # PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT はこの局面（接続確立後の終了待ち）を制御しない
      # ことが観測で判明したため撤去。DEBUG=pw:install は万一再発時の切り分け用（DL/展開の特定）。
      #
      # 1 回でも成功すればキャッシュが seed され、以降の run は cache hit で DL 経路自体をスキップできる。
      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        env:
          NODE_OPTIONS: "--dns-result-order=ipv4first"
          DEBUG: "pw:install"
        run: |
          for attempt in 1 2 3 4; do
            echo "::group::playwright install --only-shell (attempt ${attempt}/4)"
            if timeout 120 npx playwright install --only-shell chromium; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "attempt ${attempt} がタイムアウト/失敗。リトライします。"
            sleep 5
          done
          echo "playwright install が 4 回とも失敗しました。" >&2
          exit 1

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Run Storybook tests
        run: npm run test-storybook:ci
