name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Type check
        run: npm run tsc

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build
        run: npm run build

  storybook:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build Storybook
        run: npm run build-storybook

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./node_modules/playwright/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # ブラウザバイナリ DL（キャッシュミス時のみ）と system deps（毎回 apt）を分離する。
      # --with-deps で両者を束ねると DL/apt のどちらが詰まっても切り分け不能になり、
      # かつ DL 経路がハングするとキャッシュ保存まで到達せず cold miss が永続化するため。
      #
      # `playwright install chromium` は chromium 本体 DL 完了後、二次アーティファクト
      # （headless shell / ffmpeg）の取得が接続段階でサイレント stall する事象が観測された
      # （本体 DL は数秒で完走するのに以降 15 分無出力 → timeout で cancel）。
      # 1 回あたり timeout を付けてリトライし、1 回でも成功すればキャッシュが seed され
      # 以降の run は cache hit で DL 経路自体をスキップできる。
      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          for attempt in 1 2 3; do
            echo "::group::playwright install chromium (attempt ${attempt}/3)"
            if timeout 240 npx playwright install chromium; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "attempt ${attempt} がタイムアウト/失敗。リトライします。"
            sleep 5
          done
          echo "playwright install が 3 回とも失敗しました。" >&2
          exit 1

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Run Storybook tests
        run: npm run test-storybook:ci
