name: Cleanup Pending Orders

on:
  # NOTE: 本番ローンチまで schedule を停止中。
  # CRON_SECRET / SITE_URL の repository secrets が未設定のため、schedule 実行が
  # 毎回ガードで exit 1 し続けていた。本番デプロイ + secrets 登録後に再有効化する。
  #   30 分ごとに /api/cron/cleanup-pending-orders を叩く想定
  #   Vercel Hobby プランの Cron は 1 日 1 回上限のため、外部 cron として GitHub Actions schedule を採用
  # schedule:
  #   - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cleanup endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$SITE_URL" ]; then
            echo "CRON_SECRET / SITE_URL secrets are not configured"
            exit 1
          fi
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 60 \
            --write-out "\nHTTP_STATUS:%{http_code}\n" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL}/api/cron/cleanup-pending-orders")
          echo "$response"
